<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Nutri-Scanner v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; }
        #scanner-container { width: 100%; height: 50vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.drawingBuffer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 150px; border: 3px solid #2ecc71; border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 5;
        }

        .result-panel { 
            background: white; color: #333; padding: 20px; border-radius: 20px 20px 0 0;
            min-height: 50vh; margin-top: -20px; position: relative; z-index: 10;
        }
        .btn-retry { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
        .stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        #status { text-align: center; color: #888; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="scanner-container">
    <div class="overlay"></div>
</div>

<div class="result-panel">
    <p id="status">Loading camera...</p>
    
    <div id="res-content" style="display:none;">
        <h2 id="p-name" style="margin:0;">Product Name</h2>
        <p id="p-brand" style="color:#666;">Brand</p>
        <div class="stat"><span>Calories:</span> <span id="v-cal" style="font-weight:bold;">0</span> kcal</div>
        <div class="stat"><span>Protein:</span> <span id="v-pro" style="font-weight:bold;">0</span> g</div>
        <button class="btn-retry" onclick="location.reload()">SCAN ANOTHER</button>
    </div>
</div>

<script>
    function startApp() {
        Quagga.init({
            inputStream: {
                name: "Live", type: "LiveStream",
                target: document.querySelector('#scanner-container'),
                constraints: { facingMode: "environment", width: 640, height: 480 }
            },
            locator: { patchSize: "medium", halfSample: true },
            decoder: { readers: ["ean_reader", "upc_reader", "code_128_reader"] }
        }, function(err) {
            if (err) { document.getElementById('status').innerText = "Camera Error! Use Chrome/HTTPS."; return; }
            Quagga.start();
            document.getElementById('status').innerText = "Itapat ang barcode sa box...";
        });

        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            document.getElementById('status').innerText = "Found: " + code;
            fetchData(code);
            Quagga.stop();
        });
    }

    async function fetchData(code) {
        try {
            const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const d = await r.json();
            if(d.status === 1) {
                document.getElementById('res-content').style.display = "block";
                document.getElementById('status').style.display = "none";
                document.getElementById('p-name').innerText = d.product.product_name || "Unknown";
                document.getElementById('p-brand').innerText = d.product.brands || "No Brand";
                document.getElementById('v-cal').innerText = Math.round(d.product.nutriments['energy-kcal_100g'] || 0);
                document.getElementById('v-pro').innerText = (d.product.nutriments['proteins_100g'] || 0).toFixed(1);
            } else {
                alert("Product not found!");
                location.reload();
            }
        } catch(e) { alert("Error connecting..."); location.reload(); }
    }

    window.onload = startApp;
</script>
</body>
</html>
